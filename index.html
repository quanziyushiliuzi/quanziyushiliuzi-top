<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuanSpace</title>
  <style>
    /* 所有CSS样式保持不变，只修复JS */
    /* 为节省空间，这里省略CSS，实际文件中请保留所有CSS代码 */
  </style>
</head>
<body>
  <!-- 页面结构保持不变 -->
  <!-- 省略HTML结构，实际文件中请保留所有HTML -->

  <!-- 引入Supabase的正确方式 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // 🔧 修复1：正确初始化Supabase
    const SUPABASE_URL = 'https://hovporynwsdxzexedasm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvdnBvcnlud3NkeHpleGVkYXNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODQ1NjksImV4cCI6MjA5MTY2MDU2OX0.5bFSIQdTsyIUJi68rnFRoJGS6ApNuTIqdoO1Vm6rJwg';
    
    // 全局错误处理
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error('全局错误:', msg, error);
      return false;
    };
    
    // 确保supabase对象可用
    if (typeof supabase === 'undefined') {
      console.error('Supabase库未加载，检查网络连接');
    }
    
    // 初始化Supabase客户端
    let supabaseClient = null;
    try {
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      console.log('Supabase客户端初始化成功');
    } catch (error) {
      console.error('Supabase初始化失败:', error);
      alert('数据库连接失败，请刷新页面');
    }
    
    // 全局变量
    let currentUser = {
      id: null,
      nickname: '新用户',
      handle: 'user',
      bio: '',
      avatarChar: '👤'
    };
    
    let posts = [];
    let isAdmin = false;
    const ADMIN_PASSWORD = '200918';
    
    // 📱 工具函数
    function generateId() {
      return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }
    
    function formatTime(dateString) {
      try {
        const date = new Date(dateString);
        const now = new Date();
        const diff = now - date;
        
        const minutes = Math.floor(diff / 60000);
        if (minutes < 1) return '刚刚';
        if (minutes < 60) return `${minutes}分钟前`;
        
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}小时前`;
        
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days}天前`;
        
        return date.toLocaleDateString('zh-CN');
      } catch (e) {
        return '未知时间';
      }
    }
    
    // 👤 用户管理
    function loadUser() {
      try {
        const savedUser = localStorage.getItem('q_user');
        if (savedUser) {
          const user = JSON.parse(savedUser);
          currentUser = { ...currentUser, ...user };
        } else {
          currentUser.id = generateId();
          currentUser.handle = 'user_' + currentUser.id.slice(-6);
          saveUser();
        }
        updateUserUI();
      } catch (error) {
        console.error('加载用户失败:', error);
      }
    }
    
    function saveUser() {
      localStorage.setItem('q_user', JSON.stringify(currentUser));
    }
    
    // 📄 帖子管理
    async function loadPosts() {
      if (!supabaseClient) {
        console.error('Supabase客户端未初始化');
        return;
      }
      
      try {
        const { data, error } = await supabaseClient
          .from('posts')
          .select('*')
          .order('created_at', { ascending: false })
          .limit(50);
        
        if (error) throw error;
        
        posts = data || [];
        renderPosts();
      } catch (error) {
        console.error('加载帖子失败:', error);
      }
    }
    
    async function createPost() {
      const textarea = document.getElementById('composerTextarea');
      const content = textarea.value.trim();
      
      if (!content || content.length > 280) return;
      
      if (!supabaseClient) {
        alert('数据库连接失败');
        return;
      }
      
      const newPost = {
        id: generateId(),
        user_id: currentUser.id,
        nickname: currentUser.nickname,
        handle: currentUser.handle,
        avatar_char: currentUser.avatarChar,
        content: content,
        created_at: new Date().toISOString(),
        likes: 0,
        retweets: 0,
        replies: 0,
        liked: false,
        retweeted: false
      };
      
      try {
        const { error } = await supabaseClient.from('posts').insert([newPost]);
        if (error) throw error;
        
        textarea.value = '';
        document.getElementById('charCountDisplay').textContent = '0/280';
        document.getElementById('postButton').disabled = true;
      } catch (error) {
        console.error('发布失败:', error);
        alert('发布失败: ' + error.message);
      }
    }
    
    async function deletePost(postId) {
      if (!confirm('确定要删除这条帖子吗？')) return;
      
      if (!supabaseClient) {
        alert('数据库连接失败');
        return;
      }
      
      try {
        const { error } = await supabaseClient
          .from('posts')
          .delete()
          .eq('id', postId);
        
        if (error) throw error;
      } catch (error) {
        console.error('删除失败:', error);
        alert('删除失败: ' + error.message);
      }
    }
    
    // 🔧 管理员系统
    function checkAdminStatus() {
      isAdmin = localStorage.getItem('q_admin') === 'true';
    }
    
    function toggleAdminMode() {
      if (isAdmin) {
        isAdmin = false;
        localStorage.removeItem('q_admin');
        alert('已退出管理员模式');
      } else {
        const password = prompt('请输入管理员密码:');
        if (password === ADMIN_PASSWORD) {
          isAdmin = true;
          localStorage.setItem('q_admin', 'true');
          alert('管理员模式已开启！您可以删除任何帖子。');
        } else {
          alert('密码错误');
        }
      }
      renderPosts();
    }
    
    // 🔄 实时订阅
    function setupRealtime() {
      if (!supabaseClient) {
        console.error('Supabase客户端未初始化，无法订阅');
        return;
      }
      
      try {
        const channel = supabaseClient
          .channel('posts_changes')
          .on('postgres_changes', 
            { event: '*', schema: 'public', table: 'posts' }, 
            (payload) => {
              console.log('收到实时更新');
              loadPosts();
            }
          )
          .subscribe();
        
        return channel;
      } catch (error) {
        console.error('实时订阅失败:', error);
      }
    }
    
    // 🎮 交互功能
    function updateCharCount() {
      const textarea = document.getElementById('composerTextarea');
      const length = textarea.value.length;
      document.getElementById('charCountDisplay').textContent = `${length}/280`;
      document.getElementById('postButton').disabled = length === 0 || length > 280;
    }
    
    // 🎯 修复：直接绑定事件监听器
    function setupEventListeners() {
      // 绑定字符计数
      const textarea = document.getElementById('composerTextarea');
      if (textarea) {
        textarea.addEventListener('input', updateCharCount);
      }
      
      // 绑定回车登录
      document.getElementById('stuId')?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleLogin();
        }
      });
    }
    
    // 页面加载初始化
    document.addEventListener('DOMContentLoaded', function() {
      console.log('页面加载完成');
      
      // 加载用户
      loadUser();
      
      // 检查管理员状态
      checkAdminStatus();
      
      // 设置事件监听器
      setupEventListeners();
      
      // 设置实时订阅
      setupRealtime();
      
      // 加载帖子
      loadPosts();
      
      console.log('初始化完成');
    });
  </script>
</body>
</html>
