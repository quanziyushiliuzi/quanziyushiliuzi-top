<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全智宇是瘤子</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * { font-family: system-ui, -apple-system, sans-serif; }
    
    .login-btn:active {
      transform: scale(0.98);
    }
    
    .error-message {
      color: #ef4444;
      font-size: 12px;
      margin-top: 5px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">
  <!-- 登录页 -->
  <div id="loginPage" class="w-full max-w-sm">
    <h1 class="text-3xl font-bold text-center mb-8 text-red-500">全智宇是瘤子</h1>
    
    <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
      <h2 class="text-lg font-semibold mb-4 text-center">登录</h2>
      
      <div class="mb-4">
        <input 
          type="text" 
          id="stuId" 
          placeholder="输入学号 23009001xx"
          autocomplete="off"
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 outline-none focus:border-red-500"
          maxlength="10"
        >
        <div id="errorMsg" class="error-message"></div>
      </div>
      
      <button 
        onclick="handleLogin()"
        id="loginBtn"
        class="w-full bg-red-600 hover:bg-red-700 text-white font-medium py-3 rounded-lg transition login-btn disabled:opacity-50"
      >
        进入
      </button>
      
      <div class="mt-4 text-center text-sm text-gray-500">
        <p>可用学号: 2300900101-2300900199</p>
        <p>输入其他内容会被清空</p>
      </div>
    </div>
  </div>

  <!-- 主应用 -->
  <div id="app" class="hidden w-full max-w-2xl p-4">
    <header class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center">
          <span class="font-bold text-sm">全</span>
        </div>
        <h1 class="text-xl font-bold text-red-400">全智宇是瘤子</h1>
      </div>
      <button onclick="logout()" class="text-sm text-gray-400 hover:text-white">退出</button>
    </header>

    <div class="bg-gray-900 border border-gray-800 rounded-lg p-4 mb-4">
      <div class="flex gap-3">
        <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-medium text-sm" id="userAvatar"></div>
        <div class="flex-1">
          <h3 id="welcomeTitle" class="font-medium text-sm mb-1">欢迎</h3>
          <textarea 
            id="postContent"
            placeholder="分享你的想法..."
            class="w-full bg-transparent outline-none resize-none text-sm min-h-[60px]"
            maxlength="280"
          ></textarea>
          <div class="flex items-center justify-between mt-2 pt-2 border-t border-gray-800">
            <div class="text-xs text-gray-500">
              <span id="charCount">0</span>/280
            </div>
            <button 
              onclick="publishPost()"
              id="publishBtn"
              class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-3 py-1.5 rounded disabled:opacity-50"
              disabled
            >
              发布
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <div id="postsContainer" class="space-y-3"></div>
  </div>

<script>
// ========== 配置 ==========
const SUPABASE_URL = 'https://hovporynwsdxzexedasm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvdnBvcnlud3NkeHpleGVkYXNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODQ1NjksImV4cCI6MjA5MTY2MDU2OX0.5bFSIQdTsyIUJi68rnFRoJGS6ApNuTIqdoO1Vm6rJwg';

// 全局变量
let supabase = null;
let currentUser = null;

// ========== 工具函数 ==========
function showError(message) {
  const errorEl = document.getElementById('errorMsg');
  errorEl.textContent = message;
  errorEl.style.display = 'block';
  setTimeout(() => {
    errorEl.style.display = 'none';
  }, 3000);
}

// ========== 核心登录函数 ==========
async function handleLogin() {
  const stuId = document.getElementById('stuId').value.trim();
  const btn = document.getElementById('loginBtn');
  
  console.log('登录尝试:', stuId);
  
  // 1. 验证学号格式
  if (stuId.length !== 10) {
    console.log('长度验证失败');
    document.getElementById('stuId').value = '';
    return;
  }
  
  if (!stuId.startsWith('23009001')) {
    console.log('开头验证失败');
    document.getElementById('stuId').value = '';
    return;
  }
  
  const lastTwo = stuId.slice(-2);
  if (lastTwo < '01' || lastTwo > '99') {
    console.log('范围验证失败:', lastTwo);
    document.getElementById('stuId').value = '';
    return;
  }
  
  if (!/^\d+$/.test(stuId)) {
    console.log('数字验证失败');
    document.getElementById('stuId').value = '';
    return;
  }
  
  console.log('学号验证通过');
  
  // 2. 显示加载状态
  btn.disabled = true;
  btn.textContent = '验证中...';
  
  try {
    // 3. 初始化 Supabase
    if (!supabase) {
      console.log('初始化 Supabase 连接');
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      
      // 简单连接测试
      const { error: testError } = await supabase.from('users').select('stu_id').limit(1);
      if (testError && testError.code !== 'PGRST116') {
        console.error('Supabase 连接失败:', testError);
        showError('数据库连接失败，请刷新重试');
        return;
      }
      console.log('Supabase 连接成功');
    }
    
    // 4. 检查用户是否存在
    console.log('查询用户:', stuId);
    const { data: existingUser, error: checkError } = await supabase
      .from('users')
      .select('*')
      .eq('stu_id', stuId)
      .single();
    
    let userData = existingUser;
    
    // 用户不存在则创建
    if (!userData) {
      console.log('创建新用户');
      const { data: newUser, error: createError } = await supabase
        .from('users')
        .insert([{
          stu_id: stuId,
          nick: `用户${lastTwo}`,
          created_at: new Date().toISOString()
        }])
        .select()
        .single();
      
      if (createError) {
        console.error('创建用户失败:', createError);
        showError('用户创建失败');
        return;
      }
      userData = newUser;
      console.log('新用户创建成功');
    } else {
      console.log('用户已存在');
    }
    
    // 5. 保存用户信息
    currentUser = userData;
    localStorage.setItem('current_user', JSON.stringify(userData));
    
    // 6. 更新界面
    document.getElementById('userAvatar').textContent = stuId.slice(-2);
    document.getElementById('welcomeTitle').textContent = `欢迎，用户${lastTwo}`;
    
    // 7. 切换页面
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    
    console.log('登录成功，切换到主界面');
    
    // 8. 加载帖子
    await loadPosts();
    
  } catch (error) {
    console.error('登录过程出错:', error);
    showError('登录失败，请检查网络');
  } finally {
    // 恢复按钮状态
    btn.disabled = false;
    btn.textContent = '进入';
  }
}

// ========== 帖子功能 ==========
async function loadPosts() {
  const container = document.getElementById('postsContainer');
  container.innerHTML = '<div class="text-center py-4 text-gray-500">加载中...</div>';
  
  try {
    const { data: posts, error } = await supabase
      .from('posts')
      .select(`
        *,
        author:users(stu_id, nick)
      `)
      .order('created_at', { ascending: false })
      .limit(20);
    
    if (error) throw error;
    
    renderPosts(posts || []);
    
  } catch (error) {
    console.error('加载帖子失败:', error);
    container.innerHTML = '<div class="text-center py-4 text-red-500">加载失败</div>';
  }
}

function renderPosts(posts) {
  const container = document.getElementById('postsContainer');
  
  if (posts.length === 0) {
    container.innerHTML = '<div class="text-center py-8 text-gray-500">还没有帖子</div>';
    return;
  }
  
  container.innerHTML = posts.map(post => `
    <div class="bg-gray-900 border border-gray-800 rounded-lg p-3">
      <div class="flex items-center gap-2 mb-2">
        <div class="w-6 h-6 bg-red-600 rounded-full text-xs flex items-center justify-center">
          ${post.author?.stu_id?.slice(-2) || '??'}
        </div>
        <span class="font-medium text-sm">${post.author?.nick || '用户'}</span>
        <span class="text-xs text-gray-500 ml-auto">${formatTime(post.created_at)}</span>
      </div>
      <div class="text-sm mb-2">${escapeHtml(post.content)}</div>
      <div class="flex gap-4 text-xs text-gray-500">
        <button onclick="likePost('${post.id}')" class="hover:text-red-400">
          ❤️ ${post.likes?.length || 0}
        </button>
        ${post.author?.stu_id === currentUser?.stu_id ? `
          <button onclick="deletePost('${post.id}')" class="hover:text-red-400">删除</button>
        ` : ''}
      </div>
    </div>
  `).join('');
}

async function publishPost() {
  const content = document.getElementById('postContent').value.trim();
  if (!content || !currentUser) return;
  
  const btn = document.getElementById('publishBtn');
  btn.disabled = true;
  btn.textContent = '发布中...';
  
  try {
    const { error } = await supabase
      .from('posts')
      .insert([{
        content: content,
        author_id: currentUser.stu_id,
        likes: [],
        created_at: new Date().toISOString()
      }]);
    
    if (error) throw error;
    
    document.getElementById('postContent').value = '';
    document.getElementById('charCount').textContent = '0';
    await loadPosts();
    
  } catch (error) {
    console.error('发布失败:', error);
    alert('发布失败');
  } finally {
    btn.disabled = false;
    btn.textContent = '发布';
  }
}

async function likePost(postId) {
  if (!currentUser) return;
  try {
    const { error } = await supabase.rpc('toggle_like', {
      post_id: postId,
      user_id: currentUser.stu_id
    });
    if (error) throw error;
    await loadPosts();
  } catch (error) {
    console.error('点赞失败:', error);
  }
}

async function deletePost(postId) {
  if (!confirm('确定删除？')) return;
  if (!currentUser) return;
  try {
    const { error } = await supabase
      .from('posts')
      .delete()
      .eq('id', postId)
      .eq('author_id', currentUser.stu_id);
    if (error) throw error;
    await loadPosts();
  } catch (error) {
    console.error('删除失败:', error);
  }
}

function logout() {
  if (confirm('退出登录？')) {
    localStorage.removeItem('current_user');
    location.reload();
  }
}

// ========== 工具函数 ==========
function formatTime(dateString) {
  const date = new Date(dateString);
  const now = new Date();
  const diff = now - date;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return `${mins}分钟前`;
  if (mins < 1440) return `${Math.floor(mins / 60)}小时前`;
  return `${Math.floor(mins / 1440)}天前`;
}

function escapeHtml(text) {
  return text.replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

// ========== 事件监听 ==========
document.addEventListener('DOMContentLoaded', () => {
  // 字符计数
  const textarea = document.getElementById('postContent');
  const charCount = document.getElementById('charCount');
  const publishBtn = document.getElementById('publishBtn');
  
  if (textarea) {
    textarea.addEventListener('input', (e) => {
      const length = e.target.value.length;
      charCount.textContent = length;
      publishBtn.disabled = length === 0;
    });
  }
  
  // 回车登录
  document.getElementById('stuId').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      handleLogin();
    }
  });
  
  // 检查登录状态
  const savedUser = localStorage.getItem('current_user');
  if (savedUser) {
    try {
      const user = JSON.parse(savedUser);
      const stuId = user.stu_id;
      
      // 验证学号格式
      if (stuId.length === 10 && 
          stuId.startsWith('23009001') &&
          stuId.slice(-2) >= '01' && 
          stuId.slice(-2) <= '99' &&
          /^\d+$/.test(stuId)) {
        
        currentUser = user;
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('userAvatar').textContent = stuId.slice(-2);
        document.getElementById('welcomeTitle').textContent = `欢迎回来，用户${stuId.slice(-2)}`;
        
        loadPosts();
      }
    } catch (e) {
      localStorage.removeItem('current_user');
    }
  }
  
  // 在控制台显示版本信息
  console.log('基础修复版已加载');
  console.log('Supabase 配置:', SUPABASE_URL);
});
</script>
</body>
</html>
