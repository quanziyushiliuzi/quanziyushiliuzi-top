<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全智宇是瘤子</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    // 🔐 你的 Supabase 配置
    const SUPABASE_URL = 'https://hovporynwsdxzexedasm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvdnBvcnlud3NkeHpleGVkYXNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODQ1NjksImV4cCI6MjA5MTY2MDU2OX0.5bFSIQdTsyIUJi68rnFRoJGS6ApNuTIqdoO1Vm6rJwg';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // 🎯 允许的 15 个学号
    const ALLOWED_STU_IDS = new Set([
      '2300900101','2300900102','2300900103','2300900104','2300900105',
      '2300900106','2300900107','2300900108','2300900109','2300900110',
      '2300900111','2300900112','2300900113','2300900114','2300900115'
    ]);
  </script>
  <style>
    * { font-family: system-ui, -apple-system, sans-serif; }
    
    .title-main {
      font-size: 4rem;
      font-weight: 900;
      background: linear-gradient(45deg, #ff0000 0%, #ff3366 25%, #ff6666 50%, #ff3366 75%, #ff0000 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
      position: relative;
      display: inline-block;
    }
    
    .title-main::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, transparent 0%, #ff0000 20%, #ff6666 50%, #ff0000 80%, transparent 100%);
      animation: shine 3s infinite;
    }
    
    @keyframes shine {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
    
    .login-card {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 0, 0, 0.2);
      box-shadow: 0 0 50px rgba(255, 0, 0, 0.1), 0 0 100px rgba(255, 0, 0, 0.05);
    }
    
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    
    .btn-press:active { transform: scale(0.95); }
    
    .input-glow:focus { box-shadow: 0 0 0 2px rgba(255, 0, 0, 0.3); }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen overflow-x-hidden">
  <div id="particles-js"></div>
  
  <div id="loginPage" class="fixed inset-0 flex items-center justify-center p-4">
    <div class="relative z-10 w-full max-w-md">
      <div class="text-center mb-12">
        <h1 class="title-main">全智宇是瘤子</h1>
        <p class="text-white/30 mt-4 text-sm tracking-widest font-mono">[PRIVATE ACCESS REQUIRED]</p>
      </div>
      
      <div class="login-card rounded-2xl p-8">
        <div class="text-center mb-8">
          <div class="w-16 h-16 mx-auto mb-4 relative">
            <div class="w-full h-full rounded-full bg-gradient-to-br from-red-600 to-rose-600 flex items-center justify-center">
              <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
            </div>
            <div class="absolute -inset-2 bg-red-500/20 rounded-full blur-lg -z-10"></div>
          </div>
          <h2 class="text-xl font-semibold mb-2">访问认证</h2>
          <p class="text-white/40 text-sm">输入凭证以继续</p>
        </div>
        
        <form id="loginForm" onsubmit="return false" class="space-y-6">
          <div>
            <input 
              type="text" 
              id="stuId" 
              placeholder="输入凭证"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-center
                     outline-none transition-all duration-300 input-glow
                     placeholder:text-white/20"
              maxlength="10"
            >
          </div>
          
          <button 
            type="button"
            id="loginBtn"
            onclick="handleLogin()"
            class="w-full bg-gradient-to-r from-red-600 to-rose-600 
                   text-white font-semibold py-3 rounded-xl transition-all duration-300
                   hover:from-red-700 hover:to-rose-700
                   active:from-red-800 active:to-rose-800
                   btn-press disabled:opacity-50 disabled:cursor-not-allowed
                   flex items-center justify-center gap-2"
          >
            <span id="btnText">进入</span>
          </button>
        </form>
        
        <div id="noHint" class="mt-6 text-center">
          <p class="text-white/0 select-none">无任何提示信息</p>
        </div>
      </div>
    </div>
  </div>

  <div id="app" class="hidden min-h-screen">
    <header class="sticky top-0 z-40 bg-black/80 backdrop-blur-xl border-b border-white/10">
      <div class="max-w-6xl mx-auto px-4 py-3">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-red-600 to-rose-600 flex items-center justify-center">
              <span class="font-black text-sm">全</span>
            </div>
            <h1 class="text-xl font-black bg-gradient-to-r from-red-400 to-rose-400 bg-clip-text text-transparent">
              全智宇是瘤子
            </h1>
          </div>
          
          <div class="flex items-center gap-3">
            <div class="text-right">
              <p class="text-sm font-medium" id="currentStuId"></p>
              <p class="text-xs text-white/40">在线</p>
            </div>
            <button onclick="logout()" 
                    class="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 transition flex items-center justify-center">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-6">
      <div class="bg-white/5 backdrop-blur-sm border border-white/10 rounded-xl p-4 mb-6">
        <div class="flex gap-3">
          <div class="w-10 h-10 rounded-full bg-gradient-to-br from-red-600 to-rose-600 flex items-center justify-center font-semibold text-sm" id="userAvatar"></div>
          <div class="flex-1">
            <textarea 
              id="postContent"
              placeholder="有什么新鲜事？"
              class="w-full bg-transparent outline-none resize-none text-sm placeholder:text-white/30 min-h-[80px]"
              maxlength="280"
            ></textarea>
            <div class="flex items-center justify-between mt-3 pt-3 border-t border-white/10">
              <div class="text-xs text-white/40">
                <span id="charCount">0</span>/280
              </div>
              <button 
                onclick="publishPost()"
                id="publishBtn"
                class="bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700 
                       text-white text-sm font-semibold px-4 py-2 rounded-lg transition
                       disabled:opacity-50 disabled:cursor-not-allowed"
                disabled
              >
                发布
              </button>
            </div>
          </div>
        </div>
      </div>
      
      <div id="postsContainer" class="space-y-4"></div>
    </main>
  </div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
async function handleLogin() {
  const stuId = document.getElementById('stuId').value.trim();
  const btn = document.getElementById('loginBtn');
  const btnText = document.getElementById('btnText');
  
  const isValidLength = stuId.length === 10;
  const isValidStart = stuId.startsWith('23009001');
  const lastTwo = stuId.slice(-2);
  const isValidRange = lastTwo >= '01' && lastTwo <= '15';
  const isNumeric = /^\d+$/.test(stuId);
  
  if (!isValidLength || !isValidStart || !isValidRange || !isNumeric) {
    document.getElementById('stuId').value = '';
    return;
  }
  
  if (!ALLOWED_STU_IDS.has(stuId)) {
    document.getElementById('stuId').value = '';
    return;
  }
  
  btn.disabled = true;
  btnText.innerHTML = '<div class="spinner"></div>';
  
  try {
    const { data: existingUser, error: checkError } = await supabase
      .from('users')
      .select('*')
      .eq('stu_id', stuId)
      .single();
    
    if (checkError && checkError.code !== 'PGRST116') throw checkError;
    
    let userData = existingUser;
    
    if (!userData) {
      const { data: newUser, error: createError } = await supabase
        .from('users')
        .insert([{
          stu_id: stuId,
          nick: `用户${lastTwo}`,
          avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${stuId}`,
          created_at: new Date().toISOString()
        }])
        .select()
        .single();
      
      if (createError) throw createError;
      userData = newUser;
    }
    
    localStorage.setItem('current_user', JSON.stringify(userData));
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp(userData);
    
  } catch (error) {
    console.error('登录错误:', error);
    document.getElementById('stuId').value = '';
  } finally {
    btn.disabled = false;
    btnText.textContent = '进入';
  }
}

async function initApp(userData) {
  document.getElementById('currentStuId').textContent = userData.stu_id;
  document.getElementById('userAvatar').textContent = userData.stu_id.slice(-2);
  
  particlesJS('particles-js', {
    particles: {
      number: { value: 30, density: { enable: true, value_area: 800 } },
      color: { value: "#ff0000" },
      opacity: { value: 0.3, random: true },
      size: { value: 3, random: true },
      line_linked: { 
        enable: true, 
        distance: 150, 
        color: "#ff0000", 
        opacity: 0.2, 
        width: 1 
      },
      move: { enable: true, speed: 1, direction: "none", random: true }
    }
  });
  
  await loadPosts();
  setupEventListeners();
}

async function loadPosts() {
  try {
    const { data: posts, error } = await supabase
      .from('posts')
      .select(`
        *,
        author:users(stu_id, nick, avatar)
      `)
      .order('created_at', { ascending: false })
      .limit(20);
    
    if (error) throw error;
    renderPosts(posts || []);
  } catch (error) {
    console.error('加载错误:', error);
  }
}

function renderPosts(posts) {
  const container = document.getElementById('postsContainer');
  if (posts.length === 0) {
    container.innerHTML = '<div class="text-center py-8 text-white/40 text-sm">还没有动态</div>';
    return;
  }
  
  container.innerHTML = posts.map(post => `
    <div class="bg-white/5 backdrop-blur-sm border border-white/10 rounded-xl p-4">
      <div class="flex gap-3">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-red-600 to-rose-600 flex items-center justify-center text-xs font-semibold">
          ${post.author?.stu_id?.slice(-2) || '??'}
        </div>
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-2">
            <span class="font-semibold text-sm">${post.author?.nick || '用户'}</span>
            <span class="text-xs px-1.5 py-0.5 bg-red-500/20 text-red-300 rounded">${post.author?.stu_id}</span>
            <span class="text-white/30 text-xs ml-auto">${formatTime(post.created_at)}</span>
          </div>
          <div class="text-white/90 text-sm mb-3 whitespace-pre-wrap">${escapeHtml(post.content)}</div>
          <div class="flex items-center gap-4 text-xs text-white/40">
            <button onclick="likePost('${post.id}')" class="flex items-center gap-1 hover:text-red-400 transition">
              ❤️ <span>${post.likes?.length || 0}</span>
            </button>
            ${post.author?.stu_id === JSON.parse(localStorage.getItem('current_user'))?.stu_id ? `
              <button onclick="deletePost('${post.id}')" class="hover:text-red-500 transition">删除</button>
            ` : ''}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

async function publishPost() {
  const content = document.getElementById('postContent').value.trim();
  if (!content) return;
  
  const user = JSON.parse(localStorage.getItem('current_user'));
  if (!user) return;
  
  const btn = document.getElementById('publishBtn');
  btn.disabled = true;
  btn.textContent = '发布中...';
  
  try {
    const { error } = await supabase
      .from('posts')
      .insert([{
        content: content,
        author_id: user.stu_id,
        likes: [],
        created_at: new Date().toISOString()
      }]);
    
    if (error) throw error;
    document.getElementById('postContent').value = '';
    document.getElementById('charCount').textContent = '0';
    await loadPosts();
  } catch (error) {
    console.error('发布错误:', error);
  } finally {
    btn.disabled = false;
    btn.textContent = '发布';
  }
}

async function likePost(postId) {
  const user = JSON.parse(localStorage.getItem('current_user'));
  if (!user) return;
  try {
    const { error } = await supabase.rpc('toggle_like', {
      post_id: postId,
      user_id: user.stu_id
    });
    if (error) throw error;
    await loadPosts();
  } catch (error) {
    console.error('点赞错误:', error);
  }
}

async function deletePost(postId) {
  if (!confirm('确定删除？')) return;
  const user = JSON.parse(localStorage.getItem('current_user'));
  if (!user) return;
  try {
    const { error } = await supabase
      .from('posts')
      .delete()
      .eq('id', postId)
      .eq('author_id', user.stu_id);
    if (error) throw error;
    await loadPosts();
  } catch (error) {
    console.error('删除错误:', error);
  }
}

function formatTime(dateString) {
  const date = new Date(dateString);
  const now = new Date();
  const diff = now - date;
  const hours = Math.floor(diff / 3600000);
  if (hours < 1) return '刚刚';
  if (hours < 24) return `${hours}小时前`;
  return `${Math.floor(hours / 24)}天前`;
}

function escapeHtml(text) {
  return text.replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

function logout() {
  if (confirm('退出登录？')) {
    localStorage.removeItem('current_user');
    location.reload();
  }
}

function setupEventListeners() {
  const textarea = document.getElementById('postContent');
  const charCount = document.getElementById('charCount');
  const publishBtn = document.getElementById('publishBtn');
  
  if (textarea) {
    textarea.addEventListener('input', (e) => {
      const length = e.target.value.length;
      charCount.textContent = length;
      publishBtn.disabled = length === 0;
    });
  }
  
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.ctrlKey && !publishBtn.disabled) {
      publishPost();
    }
  });
  
  document.getElementById('stuId').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      handleLogin();
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const savedUser = localStorage.getItem('current_user');
  if (savedUser) {
    try {
      const user = JSON.parse(savedUser);
      if (ALLOWED_STU_IDS.has(user.stu_id)) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initApp(user);
      } else {
        localStorage.removeItem('current_user');
      }
    } catch (e) {
      localStorage.removeItem('current_user');
    }
  }
});
</script>
</body>
</html>
