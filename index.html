<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全智宇是瘤子</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #ff0000;
    }
    
    .title {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(45deg, #ff0000, #ff6666, #ff0000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    
    .subtitle {
      color: #888;
      font-size: 0.9rem;
    }
    
    .user-section {
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .user-section h2 {
      color: #ff0000;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 12px 15px;
      background: #222;
      border: 1px solid #444;
      border-radius: 5px;
      color: white;
      font-size: 1rem;
      margin-bottom: 10px;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: #ff0000;
    }
    
    .button {
      background: #ff0000;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    
    .button:hover {
      background: #cc0000;
    }
    
    .button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    
    .post-section {
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(45deg, #ff0000, #ff6666);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 10px;
    }
    
    .user-info {
      flex: 1;
    }
    
    .current-user {
      font-weight: 600;
      color: #fff;
    }
    
    .current-user-id {
      color: #888;
      font-size: 0.8rem;
    }
    
    textarea {
      width: 100%;
      background: #222;
      border: 1px solid #444;
      border-radius: 5px;
      color: white;
      font-size: 1rem;
      padding: 15px;
      resize: vertical;
      min-height: 120px;
      margin-bottom: 10px;
    }
    
    textarea:focus {
      outline: none;
      border-color: #ff0000;
    }
    
    .post-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #888;
      font-size: 0.9rem;
    }
    
    .posts-container {
      margin-top: 20px;
    }
    
    .post {
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 15px;
    }
    
    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .post-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(45deg, #ff0000, #ff6666);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.9rem;
      margin-right: 10px;
    }
    
    .post-user-info {
      flex: 1;
    }
    
    .post-username {
      font-weight: 600;
      color: #fff;
    }
    
    .post-userid {
      color: #888;
      font-size: 0.8rem;
    }
    
    .post-time {
      color: #666;
      font-size: 0.8rem;
    }
    
    .post-content {
      line-height: 1.5;
      margin-bottom: 10px;
    }
    
    .post-actions {
      display: flex;
      gap: 15px;
    }
    
    .post-action {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .post-action:hover {
      color: #ff0000;
    }
    
    .empty-state {
      text-align: center;
      color: #666;
      padding: 40px 20px;
    }
    
    .error {
      color: #ff4444;
      font-size: 0.9rem;
      margin-top: 5px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 标题 -->
    <div class="header">
      <h1 class="title">全智宇是瘤子</h1>
      <p class="subtitle">自由社区 - 无需登录，直接参与</p>
    </div>
    
    <!-- 用户设置区 -->
    <div class="user-section">
      <h2>设置你的昵称</h2>
      <input type="text" id="nicknameInput" placeholder="输入你的昵称（2-20个字符）" maxlength="20">
      <div id="nicknameError" class="error"></div>
      <button class="button" onclick="saveNickname()" id="saveNicknameBtn">保存昵称</button>
    </div>
    
    <!-- 发布区 -->
    <div class="post-section" id="postSection" style="display: none;">
      <div class="post-header">
        <div class="user-avatar" id="avatarDisplay">??</div>
        <div class="user-info">
          <div class="current-user" id="currentNickname">未设置昵称</div>
          <div class="current-user-id" id="currentUserId">用户 ID: 未生成</div>
        </div>
      </div>
      <textarea id="postContent" placeholder="分享你的想法..." maxlength="500"></textarea>
      <div class="post-footer">
        <span id="charCount">0/500</span>
        <button class="button" onclick="publishPost()" id="publishBtn" disabled>发布</button>
      </div>
    </div>
    
    <!-- 帖子列表 -->
    <div class="posts-container" id="postsContainer">
      <div class="empty-state">
        还没有帖子，成为第一个发布的人吧！
      </div>
    </div>
  </div>

  <script>
    // 全局变量
    let currentUser = {
      id: null,
      nickname: null
    };
    
    let posts = [];
    
    // 页面加载
    document.addEventListener('DOMContentLoaded', function() {
      // 检查是否有已保存的昵称
      const savedUser = localStorage.getItem('community_user');
      if (savedUser) {
        try {
          currentUser = JSON.parse(savedUser);
          setupUserInterface();
        } catch (e) {
          localStorage.removeItem('community_user');
        }
      }
      
      // 加载帖子
      loadPosts();
      
      // 字符计数
      const textarea = document.getElementById('postContent');
      const charCount = document.getElementById('charCount');
      const publishBtn = document.getElementById('publishBtn');
      
      textarea.addEventListener('input', function() {
        const length = this.value.length;
        charCount.textContent = length + '/500';
        publishBtn.disabled = length === 0 || length > 500;
      });
      
      // 生成随机用户ID
      if (!currentUser.id) {
        generateUserId();
      }
    });
    
    // 生成用户ID
    function generateUserId() {
      const randomNum = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
      currentUser.id = 'user_' + randomNum;
    }
    
    // 保存昵称
    function saveNickname() {
      const nicknameInput = document.getElementById('nicknameInput');
      const nickname = nicknameInput.value.trim();
      const errorElement = document.getElementById('nicknameError');
      const saveBtn = document.getElementById('saveNicknameBtn');
      
      // 重置错误
      errorElement.style.display = 'none';
      errorElement.textContent = '';
      
      // 验证昵称
      if (nickname.length < 2) {
        showError('昵称至少需要2个字符');
        return;
      }
      
      if (nickname.length > 20) {
        showError('昵称不能超过20个字符');
        return;
      }
      
      // 保存用户信息
      if (!currentUser.id) {
        generateUserId();
      }
      
      currentUser.nickname = nickname;
      localStorage.setItem('community_user', JSON.stringify(currentUser));
      
      // 更新界面
      setupUserInterface();
      
      // 清空输入框
      nicknameInput.value = '';
      
      // 显示成功消息
      alert('昵称设置成功！');
      
      function showError(message) {
        errorElement.textContent = message;
        errorElement.style.display = 'block';
        saveBtn.disabled = true;
        setTimeout(() => {
          saveBtn.disabled = false;
        }, 1000);
      }
    }
    
    // 设置用户界面
    function setupUserInterface() {
      document.getElementById('postSection').style.display = 'block';
      
      // 更新用户信息显示
      document.getElementById('currentNickname').textContent = currentUser.nickname;
      document.getElementById('currentUserId').textContent = '用户ID: ' + currentUser.id;
      
      // 更新头像显示（取昵称前两个字符）
      const avatarDisplay = document.getElementById('avatarDisplay');
      if (currentUser.nickname.length >= 2) {
        avatarDisplay.textContent = currentUser.nickname.substring(0, 2).toUpperCase();
      } else {
        avatarDisplay.textContent = '??';
      }
    }
    
    // 发布帖子
    function publishPost() {
      const content = document.getElementById('postContent').value.trim();
      
      if (!content || !currentUser.nickname) {
        alert('请先设置昵称并输入内容');
        return;
      }
      
      if (content.length > 500) {
        alert('内容不能超过500个字符');
        return;
      }
      
      const newPost = {
        id: 'post_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
        userId: currentUser.id,
        nickname: currentUser.nickname,
        content: content,
        time: new Date().toISOString(),
        likes: 0,
        liked: false
      };
      
      // 添加到帖子列表
      posts.unshift(newPost);
      
      // 保存到本地存储
      savePosts();
      
      // 清空输入框
      document.getElementById('postContent').value = '';
      document.getElementById('charCount').textContent = '0/500';
      document.getElementById('publishBtn').disabled = true;
      
      // 重新渲染帖子
      renderPosts();
      
      // 显示成功消息
      alert('发布成功！');
    }
    
    // 保存帖子到本地存储
    function savePosts() {
      try {
        // 只保存最近100条帖子，防止本地存储过大
        const postsToSave = posts.slice(0, 100);
        localStorage.setItem('community_posts', JSON.stringify(postsToSave));
      } catch (e) {
        console.error('保存帖子失败:', e);
      }
    }
    
    // 从本地存储加载帖子
    function loadPosts() {
      try {
        const savedPosts = localStorage.getItem('community_posts');
        if (savedPosts) {
          posts = JSON.parse(savedPosts);
        }
        renderPosts();
      } catch (e) {
        console.error('加载帖子失败:', e);
        posts = [];
      }
    }
    
    // 渲染帖子列表
    function renderPosts() {
      const container = document.getElementById('postsContainer');
      
      if (posts.length === 0) {
        container.innerHTML = '<div class="empty-state">还没有帖子，成为第一个发布的人吧！</div>';
        return;
      }
      
      let html = '';
      
      posts.forEach(post => {
        const time = formatTime(post.time);
        const avatarText = post.nickname.substring(0, 2).toUpperCase();
        
        html += `
          <div class="post" id="post-${post.id}">
            <div class="post-header">
              <div class="post-avatar">${avatarText}</div>
              <div class="post-user-info">
                <div class="post-username">${escapeHtml(post.nickname)}</div>
                <div class="post-userid">${post.userId}</div>
              </div>
              <div class="post-time">${time}</div>
            </div>
            <div class="post-content">${escapeHtml(post.content)}</div>
            <div class="post-actions">
              <button class="post-action" onclick="toggleLike('${post.id}')">
                <span>${post.liked ? '❤️' : '🤍'}</span>
                <span>${post.likes}</span>
              </button>
              ${post.userId === currentUser.id ? `
                <button class="post-action" onclick="deletePost('${post.id}')">删除</button>
              ` : ''}
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }
    
    // 点赞/取消点赞
    function toggleLike(postId) {
      const post = posts.find(p => p.id === postId);
      if (!post) return;
      
      if (post.liked) {
        post.likes--;
        post.liked = false;
      } else {
        post.likes++;
        post.liked = true;
      }
      
      savePosts();
      renderPosts();
    }
    
    // 删除帖子
    function deletePost(postId) {
      if (!confirm('确定要删除这条帖子吗？')) {
        return;
      }
      
      posts = posts.filter(post => post.id !== postId);
      savePosts();
      renderPosts();
    }
    
    // 格式化时间
    function formatTime(timeString) {
      const time = new Date(timeString);
      const now = new Date();
      const diff = now - time;
      
      const minutes = Math.floor(diff / 60000);
      if (minutes < 1) return '刚刚';
      if (minutes < 60) return `${minutes}分钟前`;
      
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}小时前`;
      
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days}天前`;
      
      return time.toLocaleDateString('zh-CN');
    }
    
    // 转义HTML
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
        .replace(/\n/g, '<br>');
    }
  </script>
</body>
</html>
