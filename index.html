<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全智宇是瘤子</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
    }
    h1 {
      color: red;
      font-size: 2.5rem;
      margin-bottom: 2rem;
    }
    .login-box {
      background: #111827;
      padding: 2rem;
      border-radius: 0.5rem;
      width: 300px;
    }
    .login-title {
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid #374151;
      border-radius: 0.375rem;
      background: #1f2937;
      color: white;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #b91c1c;
    }
    .tip {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>全智宇是瘤子</h1>
    <div class="login-box">
      <div class="login-title">登录</div>
      <input type="text" id="stuId" placeholder="请输入学号" value="2300900130">
      <button onclick="handleLogin()">进入</button>
      <div class="tip">可用学号: 2300900101-2300900199</div>
      <div class="tip">输入其他内容会被清空</div>
    </div>
  </div>

  <script>
    // 基础登录处理函数（修复未定义问题）
    function handleLogin() {
      const stuId = document.getElementById('stuId').value.trim();
      
      // 简单验证：必须是10位数字，且前8位是23009001，最后两位在01-99之间
      const isValidLength = stuId.length === 10;
      const isValidStart = stuId.startsWith('23009001');
      const lastTwo = stuId.slice(-2);
      const isValidRange = lastTwo >= '01' && lastTwo <= '99';
      const isNumeric = /^\d+$/.test(stuId);

      if (!isValidLength || !isValidStart || !isValidRange || !isNumeric) {
        // 错误时清空输入框（保持原逻辑）
        document.getElementById('stuId').value = '';
        alert('学号格式错误！请使用 2300900101-2300900199 范围内的学号');
        return;
      }

      // 验证通过后，模拟登录成功（可替换为真实业务逻辑）
      alert('登录成功！欢迎进入系统');
      // 示例：跳转到主页
      // window.location.href = 'home.html';
    }
  </script>
</body>
</html>
