<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全智宇是瘤子</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
    }
    h1 {
      color: red;
      font-size: 2.5rem;
      margin-bottom: 2rem;
    }
    .login-box {
      background: #111;
      padding: 2rem;
      border-radius: 8px;
      display: inline-block;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      margin: 0.5rem 0;
      border: 1px solid #333;
      border-radius: 4px;
      background: #222;
      color: white;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: red;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: darkred;
    }
    .hint {
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.5rem;
    }
    .error {
      color: red;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>全智宇是瘤子</h1>
    <div class="login-box">
      <h2>登录</h2>
      <input type="text" id="stuId" placeholder="输入学号" value="2300900130">
      <button onclick="handleLogin()">进入</button>
      <div class="hint">可用学号: 2300900101-2300900199</div>
      <div class="error" id="errorMsg">学号格式错误或不在允许范围内</div>
    </div>
  </div>

  <script>
    function handleLogin() {
      const stuId = document.getElementById('stuId').value.trim();
      const errorMsg = document.getElementById('errorMsg');

      // 重置错误提示
      errorMsg.style.display = 'none';

      // 验证规则
      const isValidLength = stuId.length === 10;
      const isValidStart = stuId.startsWith('23009001');
      const lastTwo = stuId.slice(-2);
      const isValidRange = lastTwo >= '01' && lastTwo <= '99';
      const isNumeric = /^\d+$/.test(stuId);

      if (!isValidLength || !isValidStart || !isValidRange || !isNumeric) {
        errorMsg.style.display = 'block';
        return;
      }

      // ✅ 验证通过，跳转到主页（或执行其他逻辑）
      alert('登录成功！即将进入...');
      // window.location.href = '/home'; // 如果你有主页，取消注释这行
    }
  </script>
</body>
</html>
